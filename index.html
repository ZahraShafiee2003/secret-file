<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CLASSIFIED FILE</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Consolas,monospace;
color:#00ff00;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:500px;
padding:25px;
border:1px solid #00ff00;
background:rgba(0,0,0,.8);
z-index:2;
box-shadow:0 0 15px #00ff00;
}

#content{
white-space:pre-line;
line-height:1.8;
}

.title{
text-align:center;
font-size:20px;
margin-bottom:20px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<div class="title">
🔒 CLASSIFIED USER FILE
</div>

<div id="content"></div>

</div>

<script>

/* MATRIX */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const chars="01";
const size=14;
const columns=Math.floor(canvas.width/size);

const drops=[];

for(let i=0;i<columns;i++){
drops[i]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=size+"px monospace";

for(let i=0;i<drops.length;i++){

const text=chars[Math.floor(Math.random()*chars.length)];

ctx.fillText(
text,
i*size,
drops[i]*size
);

if(
drops[i]*size>canvas.height
&&
Math.random()>.975
){
drops[i]=0;
}

drops[i]++;
}

}

setInterval(draw,40);


/* DEMO USERS */

const users={

sara:{
mood:"Exhausted / Overthinking",
stability:"41%",
battery:"12%",
chaos:"83%",

bugs:[
"Trusts too fast",
"Sleeps too late",
"Overthinks at night",
"Ignores own needs"
],

warning:"Subject is functioning on low emotional battery.",

classification:"NIGHT THINKER"
},

stability:"78%",
battery:"63%",
chaos:"37%",

bugs:[
"Late replies",
"Random motivation spikes",
"Overconfidence",
"Impulse decisions"
],

warning:"Unexpected energy fluctuations detected.",

classification:"CHAOS UNIT"
},

nooshin:{
mood:"Indifferent",
stability:"74%",
battery:"58%",
chaos:"36%",

bugs:[
"Hides emotions behind jokes",
"Reads messages twice before replying",
"Accidentally becomes everyone's therapist",
"Pretends not to care"
],

warning:"Subject may appear emotionally neutral while processing 247 background thoughts.",

classification:"STABLE OBSERVER"
},

reyhan:{
mood:"Bored",
stability:"63%",
battery:"29%",
chaos:"67%",

bugs:[
"Starts new hobbies every week",
"Opens apps without knowing why",
"Needs constant stimulation",
"Daydreaming detected"
],

warning:"System detected increasing boredom. Unexpected chaos may occur.",

classification:"CHAOS UNIT"
},

viat:{

stability:"46%",
battery:"11%",

"Keeps everything internal"
],

warning:"Facial expression does not match system logs.",

classification:"ENCRYPTED SOUL"
}

};
/* GET USER */

const params=
new URLSearchParams(
window.location.search
);

const user=
params.get("user")
||
"sara";

const data=
users[user]
||
users["sara"];

/* OUTPUT */

document.getElementById(
"content"
).innerHTML=`

ACCESS GRANTED...
----------------------------

USER: ${user.toUpperCase()}

${data.mood}

STABILITY: ${data.stability}

----------------------------

• ${data.bugs.join("<br>• ")}

----------------------------

${data.warning}

${data.classification}

----------------------------

> end of file...
`;

</script>

</body>
</html>
