<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CLASSIFIED SYSTEM</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: monospace;
  color: #00ff00;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* PANEL */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 420px;
  padding: 20px;
  border: 1px solid #00ff00;
  background: rgba(0,0,0,0.75);
  z-index: 2;
}

.title {
  text-align: center;
  font-size: 18px;
  margin-bottom: 10px;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">
  <div class="title">🔒 CLASSIFIED USER FILE</div>
  <div id="content"></div>
  <div class="small">SYSTEM: LIVE SCAN ACTIVE...</div>
</div>

<script>

/* ---------------- MATRIX ---------------- */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "01".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];

for (let i = 0; i < columns; i++) {
  drops[i] = 1;
}

function drawMatrix() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(drawMatrix, 40);

/* ---------------- RANDOM GENERATOR ---------------- */

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/* ---------------- DATABASE ---------------- */

const moods = [
  "Exhausted / Overthinking",
  "Happy but unstable",
  "Emotionally overloaded",
  "Calm outside, chaos inside",
  "Mentally offline"
];

const classifications = [
  "NIGHT THINKER",
  "CHAOS UNIT",
  "SOFT SYSTEM",
  "OVERTHINK ENGINE",
  "UNSTABLE BUT KIND"
];

const warnings = [
  "Subject is running low emotional battery.",
  "System detected irregular mood patterns.",
  "High overthinking activity detected.",
  "Emotional instability fluctuating.",
  "User pretending everything is fine."
];

const bugsPool = [
  "Trusts too fast",
  "Sleeps too late",
  "Overthinks at night",
  "Ignores own needs",
  "Low emotional battery",
  "Random sadness spikes",
  "Over-caring detected"
];

/* ---------------- GET USER ---------------- */

const params = new URLSearchParams(window.location.search);
const user = params.get("user") || "UNKNOWN";

/* random stats */
let stability = Math.floor(Math.random() * 60 + 30);
let battery = Math.floor(Math.random() * 80 + 10);
let chaos = Math.floor(Math.random() * 100);

/* random bugs */
let bugs = [];
for (let i = 0; i < 3; i++) {
  bugs.push(pick(bugsPool));
}

/* ---------------- OUTPUT ---------------- */

document.getElementById("content").innerHTML = `
USER: ${user}

----------------------------

CURRENT STATUS:
${pick(moods)}

STABILITY: ${stability}%
SOCIAL BATTERY: ${battery}%
CHAOS LEVEL: ${chaos}%

----------------------------

SYSTEM ANALYSIS:
• ${bugs.join("<br>• ")}

----------------------------

WARNING:
${pick(warnings)}

CLASSIFICATION:
${pick(classifications)}

----------------------------
> end of file...
`;

</script>

</body>
</html>
